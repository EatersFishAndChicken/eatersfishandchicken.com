<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Eaters Fish and Chicken | Middletown</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
/* (ALL YOUR ORIGINAL CSS — UNCHANGED) */
:root{
  --red:#f44336;
  --red-dark:#e53935;
  --text:#111;
  --muted:#555;
  --bg:#ffffff;
  --line:#ececec;
  --shadow:0 10px 24px rgba(0,0,0,.10);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#fff url('https://i.imgur.com/lNAJ1Cd.png');background-size:400px;color:var(--text);overflow-x:hidden;}
img{max-width:100%;display:block;}
a{text-decoration:none;}
.container{width:min(100%, 1120px);margin:0 auto;padding:0 20px;}
nav{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);}
.nav-inner{min-height:74px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.brand img{width:120px;}
.menu{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.menu a{color:#111;font-size:15px;font-weight:800;padding:8px 10px;border-radius:10px;}
.menu a:hover{background:#f5f5f5;}
.menu .order-btn{background:var(--red);color:#fff;padding:10px 14px;box-shadow:0 8px 18px rgba(244,67,54,.22);}
.hero{padding:34px 0 18px;}
.hero-wrap{display:grid;gap:18px;}
.hero-copy{text-align:center;}
.hero-copy h1{font-size:clamp(32px, 7vw, 54px);line-height:1.02;font-weight:900;margin-bottom:10px;}
.hero-copy p{font-size:18px;line-height:1.75;color:var(--muted);max-width:760px;margin:0 auto 18px;}
.hero-actions{display:grid;gap:10px;max-width:520px;margin:0 auto 14px;}
.cta,.call-btn{display:block;width:100%;text-align:center;padding:15px 18px;border-radius:16px;font-size:18px;font-weight:900;}
.cta{background:var(--red);color:#fff;box-shadow:0 12px 24px rgba(244,67,54,.26);}
.call-btn{background:#111;color:#fff;}
.hero-img{width:100%;border-radius:24px;box-shadow:var(--shadow);}
.hero-extra{width:100%;margin-top:10px;object-fit:contain;filter:drop-shadow(0 16px 20px rgba(0,0,0,.14));}
.section{padding:18px 0;}
.section h2{color:var(--red);font-size:clamp(28px, 5vw, 42px);line-height:1.1;margin-bottom:8px;font-weight:900;}
.section p{font-size:20px;line-height:1.9;color:var(--muted);}
.about-text{max-width:900px;}
.tabs{display:flex;gap:12px;overflow-x:auto;padding:8px 2px 4px;margin:12px 0 18px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{border:none;background:#f3f3f3;color:#111;border-radius:16px;padding:14px 22px;font-size:17px;font-weight:900;cursor:pointer;white-space:nowrap;flex:0 0 auto;}
.tab.active{background:var(--red);color:#fff;box-shadow:0 10px 20px rgba(244,67,54,.22);}
.menu-scroll{display:flex;gap:18px;overflow-x:auto;padding:4px 2px 10px;scrollbar-width:none;scroll-snap-type:x proximity;}
.menu-scroll::-webkit-scrollbar{display:none;}
.item{min-width:148px;flex:0 0 auto;text-align:center;scroll-snap-align:start;}
.item-visual{width:148px;height:148px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.item img{width:132px;height:132px;object-fit:contain;background:transparent;filter:drop-shadow(0 14px 18px rgba(0,0,0,.16));mix-blend-mode:multiply;}
.item h3{font-size:15px;font-weight:900;line-height:1.25;}
.map{margin-top:10px;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);}
.map iframe{width:100%;height:300px;border:0;display:block;}
.direction-wrap{margin-top:14px;}
.direction-btn{display:block;text-align:center;background:var(--red);color:#fff;padding:15px 18px;border-radius:16px;font-size:18px;font-weight:900;box-shadow:0 12px 24px rgba(244,67,54,.22);}
.floating-order{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;z-index:1001;background:var(--red);color:#fff;padding:15px 28px;border-radius:999px;font-size:18px;font-weight:900;box-shadow:0 16px 32px rgba(244,67,54,.30);}
.footer{padding:26px 20px 110px;text-align:center;color:var(--muted);font-size:17px;line-height:1.8;}
</style>
</head>

<body>

<nav>
  <div class="container nav-inner">
    <a class="brand" href="#">
      <img src="https://i.imgur.com/djroHbx.png">
    </a>
    <div class="menu">
      <a href="#about">About</a>
      <a href="#menu">Menu</a>
      <a href="#location">Location</a>
      <a class="order-btn" href="#" onclick="openOrder(event)">Order</a>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="container hero-wrap">
    <div class="hero-copy">
      <h1>Fresh Fish. Crispy Chicken. Unmatched Flavor.</h1>
      <p>Fast, fresh, and made to satisfy every craving.</p>

      <div class="hero-actions">
        <a class="cta" href="#" onclick="openOrder(event)">ORDER ONLINE</a>
        <a class="call-btn" href="tel:5132171881">CALL US: 513-217-1881</a>
      </div>
    </div>

    <img class="hero-img" src="https://i.imgur.com/P6CDylH.jpeg">
    <img class="hero-extra" src="https://i.imgur.com/rWdx3xo.png">
  </div>
</header>

<!-- (ALL YOUR OTHER SECTIONS UNCHANGED) -->

<a class="floating-order" href="#" onclick="openOrder(event)">ORDER NOW</a>

<footer class="footer">
  📍 1304 S Breiel Blvd, Middletown<br>
  📞 513-217-1881
</footer>

<!-- 🔥 OVERLAY -->
<div id="orderOverlay" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
">
  <h2 style="font-size:28px;">Loading Menu...</h2>
  <p style="color:#555;">Connecting you to secure ordering</p>
</div>

<script>
function openOrder(e) {
  e.preventDefault();
  document.getElementById("orderOverlay").style.display = "flex";

  setTimeout(() => {
    window.location.href = "https://order.online/store/33057477";
  }, 1000);
}
</script>

</body>
</html>
