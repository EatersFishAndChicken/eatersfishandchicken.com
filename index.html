<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Eaters Fish and Chicken</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--red:#ff2d2d;
--text:#111;
--muted:#555;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}

body{
background:#fff url('https://i.imgur.com/lNAJ1Cd.png');
background-size:400px;
color:var(--text);
}

/* NAV */
nav{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 18px;
background:#fff;
border-bottom:1px solid #eee;
z-index:1000;
}

nav img{width:100px}

.menu{
display:flex;
gap:12px;
}

.menu a{
font-size:14px;
font-weight:700;
color:#000;
text-decoration:none;
}

.order-btn{
background:var(--red);
color:#fff !important;
padding:8px 12px;
border-radius:8px;
}

/* HERO */
.hero{
padding:60px 20px 20px;
text-align:center;
}

.cta, .call-btn{
display:block;
padding:14px;
border-radius:14px;
font-weight:900;
text-decoration:none;
margin-bottom:10px;
}

.cta{background:var(--red);color:#fff}
.call-btn{background:#000;color:#fff}

.hero-img{width:100%;border-radius:20px;margin-top:10px}
.hero-extra{width:100%;margin-top:10px}

/* SECTION */
.section{
padding:25px 20px;
max-width:1100px;
margin:auto;
}

.section h2{color:var(--red);margin-bottom:6px}
.section p{color:var(--muted);font-size:17px}

/* MENU */
.tabs{
display:flex;
gap:10px;
overflow:auto;
margin:15px 0;
}

.tab{
padding:8px 14px;
border-radius:10px;
background:#eee;
cursor:pointer;
font-weight:700;
}

.tab.active{
background:var(--red);
color:#fff;
}

.menu-scroll{
display:flex;
gap:15px;
overflow-x:auto;
padding-bottom:10px;
}

.item{
min-width:130px;
text-align:center;
}

.item img{
width:120px;
height:120px;
object-fit:contain;
filter:drop-shadow(0 15px 20px rgba(0,0,0,.2));
}

.item h3{margin-top:5px;font-size:13px}

/* MAP */
.map iframe{
width:100%;
height:260px;
border-radius:15px;
border:0;
}

/* FLOAT BUTTON */
.floating-order{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:var(--red);
color:#fff;
padding:14px 25px;
border-radius:30px;
font-weight:900;
text-decoration:none;
}
</style>
</head>

<body>

<nav>
<img src="https://i.imgur.com/djroHbx.png">

<div class="menu">
<a href="#about">About</a>
<a href="#menu">Menu</a>
<a href="#location">Location</a>
<a class="order-btn" href="https://order.online/store/33057477">Order</a>
</div>
</nav>

<section class="hero">
<h1>Fresh Fish. Crispy Chicken.</h1>

<a class="cta" href="https://order.online/store/33057477">ORDER ONLINE</a>
<a class="call-btn" href="tel:5132171881">CALL US</a>

<img class="hero-img" src="https://i.imgur.com/P6CDylH.jpeg">
<img class="hero-extra" src="https://i.imgur.com/rWdx3xo.png">
</section>

<section class="section" id="about">
<h2>About Us</h2>
<p>We serve fresh crispy chicken and seafood daily.</p>
</section>

<section class="section" id="menu">
<h2>Our Menu</h2>

<div class="tabs">
<div class="tab active" onclick="filterMenu(this,'all')">All</div>
<div class="tab" onclick="filterMenu(this,'chicken')">Chicken</div>
<div class="tab" onclick="filterMenu(this,'seafood')">Seafood</div>
<div class="tab" onclick="filterMenu(this,'sandwich')">Sandwiches</div>
</div>

<div class="menu-scroll" id="menuGrid">

<div class="item chicken"><img src="https://i.imgur.com/rWdx3xo.png"><h3>Wings</h3></div>
<div class="item chicken"><img src="https://i.imgur.com/rWdx3xo.png"><h3>Party Wings</h3></div>
<div class="item chicken"><img src="https://i.imgur.com/rWdx3xo.png"><h3>Tenders</h3></div>

<div class="item seafood"><img src="https://i.imgur.com/8CVbME3.jpeg"><h3>Fish</h3></div>
<div class="item seafood"><img src="https://i.imgur.com/D5XHOAC.jpeg"><h3>Shrimp</h3></div>

<div class="item sandwich"><img src="https://i.imgur.com/k8Bb9FS.png"><h3>Philly</h3></div>
<div class="item sandwich"><img src="https://i.imgur.com/hmS9w2v.png"><h3>Gyro</h3></div>

</div>
</section>

<section class="section" id="location">
<h2>Visit Us</h2>

<div class="map">
<iframe src="https://maps.google.com/maps?q=1304%20S%20Breiel%20Blvd%20Middletown&output=embed"></iframe>
</div>

<a class="cta" href="https://www.google.com/maps/dir/?api=1&destination=1304+S+Breiel+Blvd+Middletown">Get Directions</a>

</section>

<a class="floating-order" href="https://order.online/store/33057477">ORDER NOW</a>

<script>
function filterMenu(el,type){

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
el.classList.add('active');

document.querySelectorAll('#menuGrid .item').forEach(item=>{
if(type === 'all'){
item.style.display='block';
}else{
item.style.display = item.classList.contains(type) ? 'block' : 'none';
}
});
}
</script>

</body>
</html>
